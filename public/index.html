<!DOCTYPE html>

<head>
  <title>Deep Space Communication Relay</title>

  <meta name="viewport" content="width=device-width, initial-scale=1">

  <link rel="stylesheet" href="reset.css">
  <link rel="stylesheet" href="main.css">

  <!-- Hack font -->
  <link rel="stylesheet" href="//cdn.jsdelivr.net/npm/hack-font@3/build/web/hack-subset.css">

  <!-- FontAwesome icons -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/4.7.0/css/font-awesome.min.css">

  <!-- TypewriterJS -->
  <script src="https://unpkg.com/typewriter-effect@latest/dist/core.js"></script>

  <!-- Tooltips -->
  <script src="https://unpkg.com/popper.js@1"></script>
  <script src="https://unpkg.com/tippy.js@4"></script>

  <script type="importmap">
  {
    "imports": {
      "three": "https://cdn.jsdelivr.net/npm/three@0.185.1/build/three.module.js",
      "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.185.1/examples/jsm/"
    }
  }
  </script>

  <script type="module" src="mfds.js"></script>
</head>

<body>
  <main>
    <div class="header">
      <span>
        DEEP SPACE<br>
        COMMUNICATION RELAY
      </span>

      <div class="button-row">
        <a id="go-to-dsve" href="https://dsve.akqqa.dev" target="_blank">
          <img src="/icons/eye.png">
        </a>
        <a id="retheme">
          <i class="fa fa-adjust"></i>
        </a>
        <a id="mute">
          <i class="fa fa-volume-up"></i>
        </a>
        <a id="toggle-sidebar">
          <i class="fa fa-bars"></i>
        </a>
      </div>
    </div>
    <div class="sidebar">

      <div class="dictionary">
        <div class="click-zone">
          <label id="dictionary-click-zone" for="dictionary-input">
            <p>
              CLICK HERE TO LOAD DICTIONARY FROM FILE<br>
              OR DRAG ONTO WINDOW
            </p>
          </label>
          <p id="clipboard-zone">
            <i class="fa fa-clipboard"></i>

            <dialog class="clipboard-paste">
              <div class="dialog-content">
                <p class="dialog-title">Copy or Paste Raw Dictionary
                  <button class="close-dialog">
                    X
                  </button>
                </p>

                <textarea class="dict-paste-contents" autofocus></textarea>
                <div class="button-row">
                  <button class="save-dictionary">Update Dictionary</button>
                </div>
              </div>
            </dialog>
          </p>
        </div>
        <input type="file" id="dictionary-input" />
      </div>
      <div class="dict-view">
        <p class="sidebar-header">WORDS</p>
        <div class="dict-view-content">

        </div>
      </div>

      <div class="encryption-keys" data-n="0">
        <div class="sidebar-title num-encryption-keys"></div>
        <div id="all-encryption-keys">
        </div>
      </div>

      <div class="call-signs">
        <div class="sidebar-title num-call-signs"></div>
        <div id="all-call-signs">
        </div>
        <div id="call-sign">
          <div id="call-sign-digits">
            <div class="digit" id="digit-0" data-value="0">
              <i class="fa fa-chevron-up digit-up"></i>
              <p class="value">0</p>
              <i class="fa fa-chevron-down digit-dn"></i>
            </div>
            <div class="digit" id="digit-1" data-value="0">
              <i class="fa fa-chevron-up digit-up"></i>
              <p class="value">0</p>
              <i class="fa fa-chevron-down digit-dn"></i>
            </div>
            <div class="digit" id="digit-2" data-value="0">
              <i class="fa fa-chevron-up digit-up"></i>
              <p class="value">0</p>
              <i class="fa fa-chevron-down digit-dn"></i>
            </div>
            <div class="digit" id="digit-3" data-value="0">
              <i class="fa fa-chevron-up digit-up"></i>
              <p class="value">0</p>
              <i class="fa fa-chevron-down digit-dn"></i>
            </div>
          </div>
          <button id="set-call-sign">SET CALL SIGN</button>
        </div>
      </div>
    </div>
    <div class="view">
      <div id="all-messages"></div>
    </div>
    <div class="entry" data-disabled="true">
      <div class="load-entry">
        <p>DICTIONARY REQUIRED BEFORE COMMUNICATION CAN BE ENABLED</p>
      </div>
      <div class="message-row">
        <span>&gt;&nbsp;</span>
        <input id="message-input"></input>
      </div>
    </div>
    <div class="footer">
      <p class="do-translate" data-original="[-130,0,-86,-119,-237,-38,-85,-2,-2,-241,-193,-86,-119,-237,-38,-29,-85]">
      </p>
    </div>
  </main>
</body>
